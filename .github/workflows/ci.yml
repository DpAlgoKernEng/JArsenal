name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # 测试阶段
  # ============================================
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: demo
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      zookeeper:
        image: confluentinc/cp-zookeeper:7.6.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
        ports:
          - 2181:2181
        options: >-
          --health-cmd="nc -z localhost 2181"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        ports:
          - 9092:9092
        options: >-
          --health-cmd="kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Initialize database
        run: mysql -h 127.0.0.1 -u root -proot demo < src/main/resources/schema.sql

      - name: Run backend tests
        run: mvn test -B
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/demo?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
          DB_USERNAME: root
          DB_PASSWORD: root
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          KAFKA_BOOTSTRAP_SERVERS: 127.0.0.1:9092
          JWT_SECRET: test-secret-key-for-ci-only

      - name: Generate test coverage report
        run: mvn jacoco:report -B

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Build frontend
        working-directory: ui
        run: npm run build

  # ============================================
  # 构建镜像阶段
  # ============================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

  # ============================================
  # 部署阶段 - 可选，需要配置 KUBE_CONFIG secret
  # ============================================
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    # 部署 job 不会阻止整体构建成功
    continue-on-error: true

    steps:
      - name: Check Kubernetes configuration
        id: check-config
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::KUBE_CONFIG secret not configured. Skipping deployment."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.check-config.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup kubectl
        if: steps.check-config.outputs.skip != 'true'
        uses: azure/setup-kubectl@v4

      - name: Configure Kubernetes credentials
        if: steps.check-config.outputs.skip != 'true'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy to Kubernetes
        if: steps.check-config.outputs.skip != 'true'
        run: |
          # 使用 envsubst 动态替换镜像版本，不修改源文件
          export IMAGE_REGISTRY="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          export IMAGE_TAG="${{ github.sha }}"
          export KAFKA_BOOTSTRAP="kafka:9092"

          # 应用配置
          kubectl apply -f k8s/namespace.yaml
          envsubst < k8s/configmap.yaml | kubectl apply -f -
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/mysql.yaml
          kubectl apply -f k8s/redis.yaml
          kubectl apply -f k8s/kafka.yaml

          # 等待基础设施就绪
          kubectl wait --for=condition=ready pod -l app=mysql -n jarsenal --timeout=120s || true
          kubectl wait --for=condition=ready pod -l app=redis -n jarsenal --timeout=60s || true
          kubectl wait --for=condition=ready pod -l app=kafka -n jarsenal --timeout=120s || true

          # 部署应用
          envsubst < k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

          # 等待部署完成
          kubectl rollout status deployment/jarsenal -n jarsenal --timeout=300s

      - name: Verify deployment
        if: steps.check-config.outputs.skip != 'true'
        run: |
          kubectl get pods -n jarsenal
          kubectl get services -n jarsenal

      - name: Deployment summary
        run: |
          if [ "${{ steps.check-config.outputs.skip }}" == "true" ]; then
            echo "### Deployment Skipped" >> $GITHUB_STEP_SUMMARY
            echo "KUBE_CONFIG secret not configured. To enable deployment:" >> $GITHUB_STEP_SUMMARY
            echo "1. Go to Settings > Secrets and variables > Actions" >> $GITHUB_STEP_SUMMARY
            echo "2. Add KUBE_CONFIG secret with your kubeconfig content" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Deployment Completed" >> $GITHUB_STEP_SUMMARY
          fi