apiVersion: v1
kind: ConfigMap
metadata:
  name: jarsenal-config
  namespace: jarsenal
data:
  SPRING_PROFILES_ACTIVE: "prod"
  DB_URL: "jdbc:mysql://mysql:3306/demo?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DATABASE: "0"
  KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP}"
  JWT_EXPIRATION: "3600000"
  CORS_ALLOWED_ORIGINS: "https://jarsenal.example.com"
  SERVER_PORT: "8080"
  # Flyway 配置
  SPRING_FLYWAY_OUT_OF_ORDER: "true"
  # 日志配置
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_APP: "INFO"