apiVersion: v1
kind: Secret
metadata:
  name: jarsenal-secret
  namespace: jarsenal
type: Opaque
stringData:
  # ⚠️ WARNING: 以下值仅为示例模板，部署到生产环境前必须替换为真实的强密码！
  # ⚠️ 使用以下命令生成强密码：
  #   - Linux/Mac: openssl rand -base64 32
  #   - 或：echo "$(date +%s | sha256sum | base64 | head -c 32)"
  #
  # 数据库凭证
  DB_USERNAME: "demo"
  DB_PASSWORD: "REPLACE_ME_WITH_STRONG_DB_PASSWORD"
  #
  # Redis 密码
  REDIS_PASSWORD: "REPLACE_ME_WITH_STRONG_REDIS_PASSWORD"
  #
  # JWT 密钥 (必须为强随机字符串，至少 256 位/32 字符)
  # 生成命令：openssl rand -base64 32
  JWT_SECRET: "REPLACE_ME_WITH_STRONG_JWT_SECRET_MIN_32_CHARS"
