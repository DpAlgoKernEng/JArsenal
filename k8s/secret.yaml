apiVersion: v1
kind: Secret
metadata:
  name: jarsenal-secret
  namespace: jarsenal
type: Opaque
stringData:
  # 数据库凭证 (生产环境必须替换为真实值)
  DB_USERNAME: "demo"
  DB_PASSWORD: "change-me-db-password"
  # Redis 密码
  REDIS_PASSWORD: "change-me-redis-password"
  # JWT 密钥 (必须为强随机字符串，至少 256 位)
  JWT_SECRET: "change-this-to-a-strong-random-secret-key-at-least-256-bits-for-production"