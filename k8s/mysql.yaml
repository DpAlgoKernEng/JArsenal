# ============================================
# MySQL StatefulSet for Kubernetes
# ============================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: jguard
  labels:
    app: mysql
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: MYSQL_DATABASE
              value: jguard
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: username
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - mysql
                - -h
                - localhost
                - -u
                - root
                - -p${MYSQL_ROOT_PASSWORD}
                - -e
                - SELECT 1
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: init-script
          configMap:
            name: mysql-init-script
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: jguard
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306

---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: jguard
type: Opaque
stringData:
  root-password: "change-me-root-password"
  username: "jguard"
  password: "change-me-db-password"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-script
  namespace: jguard
data:
  schema.sql: |
    CREATE DATABASE IF NOT EXISTS jguard DEFAULT CHARACTER SET utf8mb4;
    USE jguard;
    CREATE TABLE IF NOT EXISTS user (
        id BIGINT PRIMARY KEY AUTO_INCREMENT COMMENT '主键ID',
        username VARCHAR(50) NOT NULL COMMENT '用户名',
        password VARCHAR(100) NOT NULL COMMENT '密码',
        email VARCHAR(100) COMMENT '邮箱',
        status TINYINT DEFAULT 1 COMMENT '状态',
        create_time DATETIME DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
        update_time DATETIME DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP COMMENT '更新时间',
        INDEX idx_username (username),
        INDEX idx_status (status)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS refresh_token (
        id BIGINT PRIMARY KEY AUTO_INCREMENT COMMENT '主键ID',
        user_id BIGINT NOT NULL COMMENT '用户ID',
        token VARCHAR(500) NOT NULL COMMENT 'Refresh Token',
        expires_at DATETIME NOT NULL COMMENT '过期时间',
        create_time DATETIME DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
        revoked TINYINT DEFAULT 0 COMMENT '是否已撤销',
        INDEX idx_user_id (user_id),
        INDEX idx_token (token)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS audit_log (
        id BIGINT PRIMARY KEY AUTO_INCREMENT COMMENT '主键ID',
        user_id BIGINT COMMENT '用户ID',
        username VARCHAR(50) COMMENT '用户名',
        operation VARCHAR(50) NOT NULL COMMENT '操作类型',
        module VARCHAR(50) NOT NULL COMMENT '模块',
        description VARCHAR(500) COMMENT '操作描述',
        target_id BIGINT COMMENT '操作目标ID',
        ip VARCHAR(50) COMMENT '客户端IP',
        trace_id VARCHAR(50) COMMENT '链路追踪ID',
        status TINYINT DEFAULT 1 COMMENT '状态',
        error_msg VARCHAR(500) COMMENT '错误信息',
        duration BIGINT COMMENT '执行耗时(ms)',
        create_time DATETIME DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
        INDEX idx_user_id (user_id),
        INDEX idx_operation (operation),
        INDEX idx_create_time (create_time)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS event_outbox (
        id BIGINT PRIMARY KEY AUTO_INCREMENT COMMENT '主键ID',
        event_id VARCHAR(50) NOT NULL COMMENT '事件唯一标识',
        event_type VARCHAR(50) NOT NULL COMMENT '事件类型',
        aggregate_type VARCHAR(50) COMMENT '聚合类型',
        aggregate_id VARCHAR(50) COMMENT '聚合ID',
        payload TEXT NOT NULL COMMENT '事件内容(JSON)',
        status TINYINT DEFAULT 0 COMMENT '状态:0-待发送,1-已发送,2-失败',
        retry_count INT DEFAULT 0 COMMENT '重试次数',
        error_msg VARCHAR(500) COMMENT '错误信息',
        create_time DATETIME DEFAULT CURRENT_TIMESTAMP COMMENT '创建时间',
        sent_time DATETIME COMMENT '发送时间',
        INDEX idx_status (status),
        INDEX idx_event_id (event_id)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;