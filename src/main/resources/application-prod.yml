# 生产环境配置 - 所有敏感配置必须通过环境变量提供

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE:0}

# JWT 配置 (生产环境必须设置强密钥)
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}  # 1小时

# CORS 配置 (生产环境必须指定具体域名)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

# 日志配置 (生产环境减少日志)
logging:
  level:
    root: INFO
    com.example.demo: INFO
  file:
    name: /var/log/demo/application.log
    max-size: 50MB
    max-history: 30

# 关闭 Swagger (生产环境)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Actuator 配置 (生产环境限制暴露端点)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never