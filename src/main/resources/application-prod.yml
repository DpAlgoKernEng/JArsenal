# 生产环境配置 - 所有敏感配置必须通过环境变量提供

server:
  # 生产环境请求大小限制（更严格）
  tomcat:
    max-http-request-header-size: 8KB
    max-http-form-post-size: 10MB
  max-http-request-size: 10MB

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  # HTTP请求大小限制（防止超大请求DoS攻击）
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE:0}

  # Kafka 配置 (领域事件)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
    consumer:
      group-id: jarsenal-audit-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.demo.domain

# JWT 配置 (生产环境必须设置强密钥)
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}  # 1小时

# CORS 配置 (生产环境必须指定具体域名)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

# 日志配置 (生产环境减少日志)
logging:
  level:
    root: INFO
    com.example.demo: INFO
  file:
    name: /var/log/demo/application.log
    max-size: 50MB
    max-history: 30

# 关闭 Swagger (生产环境)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Actuator 配置 (生产环境限制暴露端点)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never