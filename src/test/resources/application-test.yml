server:
  port: 8080

spring:
  profiles:
    active: test

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/jguard_test?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      pool-name: TestHikariPool

  data:
    redis:
      host: localhost
      port: 6379
      password: root
      database: 1

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

# JWT 配置
jwt:
  secret: test-secret-key-at-least-256-bits-long-for-hs256-algorithm
  access-expiration: 1800000
  refresh-expiration: 604800000

# CORS 配置
cors:
  allowed-origins: http://localhost:3000

# Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health

# 日志配置
logging:
  level:
    root: WARN
    com.jguard: DEBUG